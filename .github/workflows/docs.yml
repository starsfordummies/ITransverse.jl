name: Documentation

on:
  push:
    branches:
      - main        # build & deploy on every push to main
    tags:
      - 'v*'        # build & deploy on version tags
  pull_request:
    branches:
      - main        # build (but don't deploy) on PRs to main

# Only one deployment at a time; cancel in-progress runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch
      statuses: write   # needed for Documenter's commit-status reporter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'   # always latest stable 1.x

      - name: Restore Julia package cache
        uses: julia-actions/cache@v2

      - name: Install docs dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'

      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
